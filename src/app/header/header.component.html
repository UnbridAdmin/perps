<!-- Header principal de 2 filas -->
<header class="main-header">
    <!-- Fila 1: Categorías, Login -->
    <div class="header-row-1">
        <div class="logo-section">
            <nav class="categories">
                <div *ngFor="let cat of categories.slice(0, 4); let i = index" 
                     class="category" 
                     [class.active]="cat.active"
                     (click)="selectCategory(i)">
                    {{cat.name}}
                </div>
            </nav>
        </div>
        <div class="header-actions">
            <div class="more-dropdown">
                <button class="more-btn" (click)="toggleMoreCategories()">
                    More <i class="fas fa-chevron-down"></i>
                </button>
                <div class="more-menu" *ngIf="showMoreCategories">
                    <div *ngFor="let cat of categories.slice(4); let i = index" 
                         class="more-item"
                         [class.active]="cat.active"
                         (click)="selectCategory(i + 4); toggleMoreCategories()">
                        {{cat.name}}
                    </div>
                </div>
            </div>
            <button class="login-btn">Login</button>
        </div>
    </div>

    <!-- Fila 2: Búsqueda y Tabs (For you, Trending) -->
    <div class="header-row-2">
        <div class="search-predictions">
            <i class="fas fa-search"></i>
            <input type="text" placeholder="Search predictions">
        </div>
        <div class="feed-tabs">
            <div class="tab" [class.active]="activeTab === 'for-you'" (click)="setActiveTab('for-you')">For you</div>
            <div class="tab" [class.active]="activeTab === 'trending'" (click)="setActiveTab('trending')">Trending</div>
        </div>
    </div>
</header>
