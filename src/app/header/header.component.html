<!-- Header principal de 2 filas -->
<header class="main-header">
    <!-- Fila 1: Logo, Categorías, Login -->
    <div class="header-row-1">
        <div class="logo-section">
            <div class="logo-text">LOGO</div>
            <nav class="categories">
                <div class="category active">Politics</div>
                <div class="category">Sports</div>
                <div class="category">Crypto</div>
                <div class="category">Finance</div>
                <div class="category">Tech</div>
                <div class="category">Culture</div>
            </nav>
        </div>
        <div class="header-actions">
            <button class="more-btn">
                More <i class="fas fa-chevron-down"></i>
            </button>
            <button class="login-btn">Login</button>
        </div>
    </div>

    <!-- Fila 2: Tabs (For you, Trending) y Búsqueda -->
    <div class="header-row-2">
        <div class="feed-tabs">
            <div class="tab active">For you</div>
            <div class="tab">Trending</div>
        </div>
        <div class="search-predictions">
            <i class="fas fa-search"></i>
            <input type="text" placeholder="Search predictions">
        </div>
    </div>
</header>
