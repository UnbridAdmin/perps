<div class="metrics-list-container">
  <div class="metrics-header">
    <div class="total-stat">
      <span class="value">94.2%</span>
      <span class="label">Overall Accuracy</span>
    </div>
    <div class="time-filters">
      <button class="time-filter">24h</button>
      <button class="time-filter">7d</button>
      <button class="time-filter active">30d</button>
      <button class="time-filter">All</button>
    </div>
  </div>

  <div class="metrics-list">
    <div class="metric-item" *ngFor="let item of accuracyData">
      <div class="metric-info">
        <span class="category-name">{{ item.category }}</span>
        <span class="metric-count">{{ item.hits }}/{{ item.total }} hits</span>
      </div>
      <div class="progress-bar-container">
        <div class="progress-bar" [style.width.%]="item.percentage"></div>
        <span class="percentage">{{ item.percentage }}%</span>
      </div>
    </div>
  </div>
</div>
