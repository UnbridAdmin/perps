<div class="rwa-reports-container">
  <div class="reports-header">
    <h3>
      <i class="fas fa-file-alt"></i>
      Reports
    </h3>
    <div class="reports-info">
      <span>{{ reports.length }} reports available</span>
    </div>
  </div>

  <div class="reports-list">
    <div *ngFor="let report of reports" class="report-item">
      <div class="report-icon">
        <i [class]="'fas ' + report.icon"></i>
      </div>

      <div class="report-content">
        <div class="report-header">
          <div class="report-title">{{ report.title }}</div>
          <span class="report-type">{{ report.type }}</span>
        </div>
        <div class="report-meta">
          <span class="report-date">
            <i class="fas fa-calendar"></i>
            {{ report.date | date: 'MMM dd, yyyy' }}
          </span>
          <span class="report-status" [ngClass]="'status-' + report.status.toLowerCase()">
            <i class="fas fa-circle"></i>
            {{ report.status }}
          </span>
        </div>
      </div>

      <div class="report-actions">
        <button class="action-btn view-btn" (click)="viewReport(report.id)">
          <i class="fas fa-eye"></i>
          View
        </button>
        <button class="action-btn download-btn" (click)="downloadReport(report.id)">
          <i class="fas fa-download"></i>
          Download
        </button>
      </div>
    </div>
  </div>

  <div *ngIf="reports.length === 0" class="empty-state">
    <i class="fas fa-files"></i>
    <p>No reports available yet.</p>
  </div>
</div>
