<div class="follower-list-container" *ngIf="!isLoading">
  <!-- Header Section -->
  <header class="list-header">
    <button class="back-btn" (click)="goBack()">
      <i class='bx bx-left-arrow-alt'></i>
    </button>
    <div class="user-info">
      <h2 class="display-name">{{ userProfile?.username || 'Profile' }}</h2>
      <p class="handle">@{{ userProfile?.username || 'user' }}</p>
    </div>
  </header>

  <!-- Tabs Navigation -->
  <nav class="tabs-nav">
    <button class="tab-item" [class.active]="activeTab === 'verified'" (click)="setActiveTab('verified')">
      Verified Followers
    </button>
    <button class="tab-item" [class.active]="activeTab === 'followers'" (click)="setActiveTab('followers')">
      Followers
    </button>
    <button class="tab-item" [class.active]="activeTab === 'following'" (click)="setActiveTab('following')">
      Following
    </button>
  </nav>

  <!-- User List Section -->
  <section class="user-list">
    <div *ngFor="let user of followers" class="list-item">
      <div class="user-card">
        <div class="avatar-container">
          <img [src]="user.avatar_url" alt="{{ user.display_name }}" class="avatar">
        </div>
        <div class="user-details">
          <div class="content-wrapper">
            <div class="name-badge-group">
              <span class="user-display-name">{{ user.display_name }}</span>
              <svg *ngIf="user.is_verified" class="verified-icon" viewBox="0 0 22 22" aria-hidden="true">
                <g>
                  <path
                    d="M20.396 11c-.018-.646-.215-1.275-.57-1.816-.354-.54-.852-.972-1.438-1.246.223-.607.27-1.264.14-1.897-.131-.634-.437-1.218-.882-1.687-.47-.445-1.053-.75-1.687-.882-.633-.13-1.29-.083-1.897.14-.273-.587-.704-1.086-1.245-1.44S11.647 1.62 11 1.604c-.646.017-1.273.213-1.813.568s-.969.854-1.24 1.44c-.608-.223-1.267-.272-1.902-.14-.635.13-1.22.436-1.69.882-.445.47-.749 1.055-.878 1.688-.13.633-.08 1.29.144 1.896-.587.274-1.087.705-1.443 1.245-.356.54-.555 1.17-.574 1.817.02.647.218 1.276.574 1.817.356.54.856.972 1.443 1.245-.224.606-.274 1.263-.144 1.896.13.634.433 1.218.877 1.688.47.443 1.054.747 1.687.878.633.132 1.29.084 1.897-.136.274.586.705 1.084 1.246 1.439.54.354 1.17.551 1.816.569.647-.016 1.276-.213 1.817-.567s.972-.854 1.245-1.44c.604.239 1.266.296 1.903.164.636-.132 1.22-.447 1.68-.907.46-.46.776-1.044.908-1.681s.075-1.299-.165-1.903c.586-.274 1.084-.705 1.439-1.246.354-.54.551-1.17.569-1.816zM9.662 14.85l-3.429-3.428 1.293-1.302 2.072 2.072 4.4-4.794 1.347 1.246z">
                  </path>
                </g>
              </svg>
            </div>
            <div class="middle-row">
              <span class="user-handle">@{{ user.username }}</span>
              <span *ngIf="user.follows_you" class="follows-you-badge">Follows you</span>
            </div>
            <div class="bottom-row">
              <p class="bio">{{ user.bio }}</p>
            </div>
          </div>
          <div class="actions">
            <button class="btn follow-btn" [class.following]="user.is_following" (click)="toggleFollow(user)">
              <span class="text-normal">{{ user.is_following ? 'Following' : (user.follows_you ? 'Follow back' :
                'Follow') }}</span>
              <span class="text-hover" *ngIf="user.is_following">Unfollow</span>
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Empty state or error if data fails/empty -->
    <div *ngIf="!isLoading && followers.length === 0" class="empty-state">
      <p>No content to show for {{ activeTab }} yet.</p>
    </div>

    <!-- Load More -->
    <div *ngIf="hasMore" class="load-more-container">
      <button class="load-more-btn" (click)="loadMore()" [disabled]="isLoading">
        {{ isLoading ? 'Loading...' : 'Load more' }}
      </button>
    </div>
  </section>
</div>

<!-- Loading State -->
<div *ngIf="isLoading" class="loading-overlay">
  <div class="spinner"></div>
</div>
