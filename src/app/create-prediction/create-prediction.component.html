<div class="create-prediction-container">
  <div class="header">
    <button class="back-btn" (click)="goBack()">← Volver</button>
    <h2>Create Prediction</h2>
  </div>

  <div class="content">
    <div class="form-section">
      <div class="form-row">
        <div class="form-group">
          <label>Categoría:</label>
          <app-custom-dropdown [options]="categories" [selectedItem]="category" (selectedItemChange)="category = $event"
            placeholder="Seleccionar Categoría" displayKey="label" valueKey="value">
          </app-custom-dropdown>
        </div>

        <div class="form-group">
          <label>Tipo:</label>
          <app-custom-dropdown [options]="typeOptions" [selectedItem]="type"
            (selectedItemChange)="type = $event; onTypeChange()" placeholder="Seleccionar Tipo" displayKey="label"
            valueKey="value">
          </app-custom-dropdown>
        </div>
      </div>

      <div class="form-group">
        <label for="title">Título:</label>
        <input id="title" type="text" [(ngModel)]="title" placeholder="e.g., Subida de BTC a $150,000">
      </div>

      <div class="form-group">
        <label for="imageUrl">Enlace de Imagen:</label>
        <input id="imageUrl" type="url" [(ngModel)]="imageUrl" placeholder="https://example.com/image.jpg">
      </div>

      <div class="form-group" *ngIf="type?.value === 'multiple'">
        <label>Opciones:</label>
        <div class="options-list">
          <div class="option-item" *ngFor="let option of options; let i = index; trackBy: trackByIndex">
            <input type="text" [(ngModel)]="options[i]" placeholder="e.g., Antes del 25 de Enero">
            <button type="button" class="delete-btn" (click)="removeOption(i)" title="Eliminar opción">
              <i class="fa-solid fa-trash"></i>
            </button>
          </div>
          <button class="btn btn-success add-option-btn" (click)="addOption()">+ Agregar Opción</button>
        </div>
      </div>

      <div class="form-group" *ngIf="type?.value !== 'multiple'">
        <label>Opciones:</label>
        <div class="binary-options">
          <span>SÍ</span> / <span>NO</span>
        </div>
      </div>

      <button class="btn btn-success" (click)="submitPrediction()" [disabled]="isSubmitting">
        {{ isSubmitting ? 'Creating...' : 'Create' }}
      </button>
    </div>

    <div class="preview-section">
      <h3>Preview</h3>
      <div class="prediction-card">
        <div class="prediction-header">
          <div class="prediction-avatar"
            [style.backgroundImage]="'url(https://api.dicebear.com/9.x/fun-emoji/svg?seed=you)'">
          </div>
          <div class="prediction-info">
            <h3>username</h3>
            <p>
              <span class="category-link">{{ getCategoryDisplay() || 'Categoría' }}</span>
              <span> • Hace poco • 0 participantes</span>
            </p>
          </div>
        </div>

        <div class="prediction-question">
          {{ title || 'Tu título de predicción' }}
        </div>

        <div class="prediction-image" *ngIf="imageUrl">
          <img [src]="imageUrl" alt="Prediction image" />
        </div>

        <app-fierce-intuition [prediction]="previewPrediction" [hasVoted]="false" [votedOptionId]="null">
        </app-fierce-intuition>

        <div class="prediction-tabs-container">
          <div class="prediction-tabs">
            <!-- Messages -->
            <div class="tab" title="Comentarios">
              💬 0
            </div>
            <!-- Bet/Pool -->
            <div class="tab" title="Pool de apuestas">
              🎲 0
            </div>
            <!-- Trading Market -->
            <div class="tab" title="Mercado Trading">
              📊 0 F
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
