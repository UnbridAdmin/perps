<div class="trade-detail-container">
  <div class="back-button">
    <button (click)="goBack()">&larr; Back</button>
  </div>
  <div class="prediction-header">
    <div class="user-info">
      <div class="avatar"></div>
      <div class="user-details">
        <h3>Polymarket</h3>
        <p>@polymarket · 4 ene</p>
      </div>
    </div>
    <h1 class="prediction-title">¿Quién será eliminado del reality show "Durmiendo por un Sueño"?</h1>
    <div class="stats">
      <div class="stat-item">
        <span>💵</span>
        <span>$226,326 Vol.</span>
      </div>
    </div>
  </div>

  <div class="main-content">
    <div class="left-column">
      <app-outcome [tradeData]="tradeData"></app-outcome>
      <app-comments></app-comments>
    </div>
    <div class="right-column">
      <app-trading-panel></app-trading-panel>
      <app-price-trend></app-price-trend>
    </div>
  </div>
</div>
