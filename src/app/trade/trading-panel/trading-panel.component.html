<div class="trading-panel">
  <div class="selected-outcome" *ngIf="optionData && predictionType === 'MULTIPLE'">
    <span class="label">Outcome</span>
    <span class="value">{{ optionData.option_title }}</span>
  </div>
  <div class="trading-header">
    <div class="tabs">
      <button class="tab" [class.active]="isBuyMode" (click)="toggleMode(true)">Buy</button>
      <button class="tab" [class.active]="!isBuyMode" (click)="toggleMode(false)">Sell</button>
    </div>
  </div>

  <div class="trade-options">
    <button class="option-btn" [class.selected]="selectedOption === 'yes'" (click)="selectOption('yes')">
      <span class="option-label">Yes</span>
      <span class="option-price">{{ yesPrice | number:'1.2-2' }} F</span>
    </button>
    <button class="option-btn option-btn-no" [class.selected]="selectedOption === 'no'" (click)="selectOption('no')">
      <span class="option-label">No</span>
      <span class="option-price">{{ noPrice | number:'1.2-2' }} F</span>
    </button>
  </div>

  <div class="trade-section">
    <div class="amount-section">
      <label class="section-title">{{ isBuyMode ? 'Amount' : 'Shares' }}</label>
      <input *ngIf="isBuyMode" type="number" class="amount-input" [(ngModel)]="amount" min="0" [max]="userBalance"
        placeholder="0.00" />
      <input *ngIf="!isBuyMode" type="number" class="amount-input" [(ngModel)]="sharesToSell" min="0" [max]="userShares"
        placeholder="0" />
      <div class="quick-amounts">
        <ng-container *ngIf="isBuyMode">
          <button class="quick-btn" (click)="setAmount(1)">+1</button>
          <button class="quick-btn" (click)="setAmount(20)">+20</button>
          <button class="quick-btn" (click)="setAmount(100)">+100</button>
          <button class="quick-btn max-btn" (click)="setMaxAmount()">Max</button>
        </ng-container>
        <ng-container *ngIf="!isBuyMode">
          <button class="quick-btn" (click)="setSharesToSell(1)">+1</button>
          <button class="quick-btn" (click)="setSharesToSell(10)">+10</button>
          <button class="quick-btn" (click)="setSharesToSell(100)">+100</button>
          <button class="quick-btn max-btn" (click)="setAllSharesToSell()">All</button>
        </ng-container>
      </div>
    </div>

    <div class="trade-info" *ngIf="isBuyMode">
      <div class="info-row">
        <span class="info-label">To win (Profit)</span>
        <span class="info-amount">{{ toWin }} F</span>
      </div>
      <div class="avg-price-row">
        <span class="avg-label">Price per share</span>
        <span class="avg-value">{{ (selectedOption === 'yes' ? yesPrice : noPrice) | number:'1.2-2' }} F</span>
      </div>
    </div>

    <div class="trade-info" *ngIf="!isBuyMode">
      <div class="info-row">
        <span class="info-label">Est. Proceeds</span>
        <span class="info-amount">{{ potentialProceeds }} F</span>
      </div>
      <div class="avg-price-row">
        <span class="avg-label">Avg. Buy Price</span>
        <span class="avg-value">{{ avgPrice | number:'1.3-3' }} F</span>
      </div>
    </div>

    <button class="btn btn-success btn-trade" (click)="executeTrade()" [disabled]="isTradeButtonDisabled"
      [class.insufficient]="isTradeButtonDisabled && !isLoading">
      {{ tradeButtonText }}
    </button>
  </div>
</div>
