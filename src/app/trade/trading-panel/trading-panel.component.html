<div class="trading-panel">
  <div class="trading-header">
    <div class="tabs">
      <button class="tab" [class.active]="isBuyMode" (click)="isBuyMode = true">Buy</button>
      <button class="tab" [class.active]="!isBuyMode" (click)="isBuyMode = false">Sell</button>
    </div>
  </div>

  <div class="trade-options">
    <button class="option-btn" [class.selected]="selectedOption === 'yes'" (click)="selectedOption = 'yes'">
      <span class="option-label">Yes</span>
      <span class="option-price">{{ yesPrice }}¢</span>
    </button>
    <button class="option-btn option-btn-no" [class.selected]="selectedOption === 'no'" (click)="selectedOption = 'no'">
      <span class="option-label">No</span>
      <span class="option-price">{{ noPrice }}¢</span>
    </button>
  </div>

  <div class="trade-section">
    <div class="amount-section">
      <label class="section-title">{{ isBuyMode ? 'Amount' : 'Shares' }}</label>
      <input type="number" class="amount-input" [(ngModel)]="amount" min="1" max="{{ maxAmount }}" [placeholder]="isBuyMode ? '$0' : '0'" />
      <div class="quick-amounts">
        <button class="quick-btn" (click)="setAmount(1)">+{{ isBuyMode ? '$1' : '1' }}</button>
        <button class="quick-btn" (click)="setAmount(20)">+{{ isBuyMode ? '$20' : '20' }}</button>
        <button class="quick-btn" (click)="setAmount(100)">+{{ isBuyMode ? '$100' : '100' }}</button>
        <button class="quick-btn max-btn" (click)="setMaxAmount()">Max</button>
      </div>
    </div>

    <div class="trade-info">
      <div class="info-row">
        <span class="info-label">To win</span>
        <span class="info-amount">${{ toWin }}</span>
      </div>
      <div class="avg-price-row">
        <span class="avg-label">Avg. Price</span>
        <span class="avg-value">{{ avgPrice }}¢</span>
      </div>
    </div>

    <button class="btn-trade" (click)="buyVote()" [disabled]="isLoading">
      {{ isLoading ? 'Processing...' : 'Trade' }}
    </button>
  </div>
</div>
