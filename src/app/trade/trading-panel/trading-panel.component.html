<div class="trading-panel">
  <div class="selected-outcome" *ngIf="optionData && predictionType === 'MULTIPLE'">
    <span class="label">Outcome</span>
    <span class="value">{{ optionData.option_title }}</span>
  </div>
  <div class="trading-header">
    <div class="tabs">
      <div class="tab" [class.active]="isBuyMode" (click)="toggleMode(true)">Buy</div>
      <div class="tab" [class.active]="!isBuyMode" (click)="toggleMode(false)">Sell</div>
    </div>
  </div>

  <div class="trade-options">
    <button class="option-btn" [class.selected]="selectedOption === 'yes'" (click)="selectOption('yes')">
      <span class="option-label">Yes</span>
      <span class="option-price">{{ yesPrice | number:'1.2-2' }} $F</span>
    </button>
    <button class="option-btn option-btn-no" [class.selected]="selectedOption === 'no'" (click)="selectOption('no')">
      <span class="option-label">No</span>
      <span class="option-price">{{ noPrice | number:'1.2-2' }} $F</span>
    </button>
  </div>

  <div class="trade-section">
    <div class="amount-section">
      <label class="section-title">{{ isBuyMode ? 'Amount' : 'Shares' }}</label>
      <input *ngIf="isBuyMode" type="number" class="amount-input" [(ngModel)]="amount" min="0" [max]="userBalance"
        placeholder="0.00" />
      <input *ngIf="!isBuyMode" type="number" class="amount-input" [(ngModel)]="sharesToSell" min="0" [max]="userShares"
        placeholder="0" />
      <div class="quick-amounts">
        <ng-container *ngIf="isBuyMode">
          <button class="quick-btn" (click)="setAmount(1)">+$F1</button>
          <button class="quick-btn" (click)="setAmount(5)">+$F5</button>
          <button class="quick-btn" (click)="setAmount(10)">+$F10</button>
          <button class="quick-btn" (click)="setAmount(100)">+$F100</button>
          <button class="quick-btn max-btn" (click)="setMaxAmount()">Max</button>
        </ng-container>
        <ng-container *ngIf="!isBuyMode">
          <button class="quick-btn" (click)="setSharesPercent(25)">25%</button>
          <button class="quick-btn" (click)="setSharesPercent(50)">50%</button>
          <button class="quick-btn max-btn" (click)="setAllSharesToSell()">Max</button>
        </ng-container>
      </div>
    </div>

    <div class="trade-info-container" *ngIf="isBuyMode">
      <div class="main-info">
        <span class="label">To win 💸</span>
        <span class="value win-amount">$F {{ toWin | number:'1.2-2' }}</span>
      </div>
      <div class="sub-info" *ngIf="estAvgPrice > 0">
        <span class="label">Avg. Price {{ (estAvgPrice) | number:'1.0-0' }}$F <i
            class="fa-solid fa-circle-info info-icon"></i></span>
      </div>
    </div>

    <div class="trade-info-container" *ngIf="!isBuyMode">
      <div class="main-info">
        <span class="label">You'll receive 💸</span>
        <span class="value receive-amount">$F {{ potentialProceeds | number:'1.2-2' }}</span>
      </div>
      <div class="sub-info" *ngIf="estAvgPrice > 0">
        <span class="label">Avg. Price {{ (estAvgPrice) | number:'1.0-0' }}$F <i
            class="fa-solid fa-circle-info info-icon"></i></span>
      </div>
    </div>

    <button class="btn btn-success btn-trade" (click)="executeTrade()" [disabled]="isTradeButtonDisabled"
      [class.insufficient]="isTradeButtonDisabled && !isLoading">
      {{ tradeButtonText }}
    </button>
  </div>
</div>
