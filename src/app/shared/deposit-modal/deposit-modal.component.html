<div class="modal-header">
  <button class="close-btn" aria-label="Cerrar" (click)="close()">
    <span>&times;</span>
  </button>
</div>

<div class="modal-body">
  <div class="header-content">
    <div class="deposit-title">Deposit</div>
    <div class="balance-text">Platform Balance: ${{ unbridBalance | number:'1.2-2' }}</div>
  </div>
  <!-- Wallet Option -->
  <div class="option-card active" [class.processing]="isProcessing">
    <div class="option-icon">
      <i class="bx bx-wallet"></i>
    </div>
    <div class="option-details">
      <div class="option-name">Wallet</div>
      <div class="option-meta">{{ fierceBalance | number:'1.2-2' }} FIERCE • Instant</div>
    </div>
  </div>

  <!-- Amount Input Section (Specific to Wallet Deposit) -->
  <div class="input-section mt-4" *ngIf="selectedMethod === 'fierce'">
    <label class="input-label">Amount to Deposit</label>
    <div class="input-wrapper">
      <input type="number" [(ngModel)]="amount" placeholder="0.00" class="amount-input" [disabled]="isProcessing">
      <span class="currency-label">FIERCE</span>
    </div>
  </div>
</div>
<div class="modal-actions">
  <button class="btn btn-cancel" (click)="close()" [disabled]="isProcessing">
    <span *ngIf="!isProcessing">Cancel</span>
  </button>
  <button class="btn btn-success" (click)="confirmDeposit()" [disabled]="isProcessing || !amount">
    <span *ngIf="!isProcessing">Confirm Deposit</span>
    <span *ngIf="isProcessing">
      <i class="bx bx-loader-alt bx-spin"></i> Processing...
    </span>
  </button>
</div>
