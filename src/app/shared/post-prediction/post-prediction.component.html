<div class="prediction-list env-wrap" infiniteScroll [infiniteScrollDistance]="2" [infiniteScrollThrottle]="50"
  (scrolled)="onScroll()">

  <!-- Loading indicator -->
  <div class="loading-indicator" *ngIf="isLoading && predictions.length === 0">
    Loading predictions...
  </div>

  <div class="env-card" *ngFor="let prediction of predictions; let i = index">
    <!-- Quick Action Buttons -->
    <div class="quick-action-buttons">
      <button class="quick-action-btn bet-btn" (click)="toggleBetPopover(i)" title="Pool de apuestas">
        BET
      </button>
      <button class="quick-action-btn trade-btn" (click)="navigateToTrade(prediction)" title="Ir al Trading">
        TRADE
      </button>
    </div>

    <div class="env-card-header">
      <div class="env-avatar"
        [style.backgroundImage]="'url(' + (prediction.creatorAvatar || 'https://api.dicebear.com/9.x/fun-emoji/svg') + ')'"
        [style.backgroundSize]="'cover'" [style.backgroundPosition]="'center'">
      </div>
      <div class="env-user-info">
        <div class="env-username" [routerLink]="['/', prediction.creator]" style="cursor: pointer;">{{
          prediction.creator }} <span class="env-participants">· {{ prediction.participants }} participantes</span>
        </div>
        <span class="env-tag tag-sports" (click)="navigateToCategory(prediction.prediction_category_id)"
          style="cursor: pointer;">{{ prediction.category }}</span>
      </div>
    </div>

    <!-- Question with optional thumbnail -->
    <div class="env-card-img-row" (click)="navigateToPostDetail(prediction.prediction_id)" style="cursor: pointer;">
      <div class="env-thumb" *ngIf="prediction.imageUrl">
        <img [src]="prediction.imageUrl" alt="Prediction image"
          style="width: 100%; height: 100%; object-fit: cover; border-radius: 8px;">
      </div>
      <div class="env-thumb" *ngIf="!prediction.imageUrl">❓</div>
      <div class="env-title">
        {{ prediction.question }}
      </div>
    </div>

    <!-- Sentiment Voting Section -->
    <app-fierce-intuition [prediction]="prediction" [hasVoted]="hasUserVoted(prediction.prediction_id)"
      [votedOptionId]="getUserVotedOptionId(prediction.prediction_id)" (vote)="voteOnPrediction(i, $event)"
      (showHowItWorks)="openHowItWorksModal()">
    </app-fierce-intuition>

    <!-- Featured Comment Section (King of the Hill) -->
    <div class="featured-comment-container" style="border: none; margin: 0; padding: 0;">
      <app-featured-comment [comment]="prediction.featuredComment"
        (overthrow)="toggleOverthrowForm(i)"></app-featured-comment>

      <!-- In-line Overthrow Form (Accordion Style) -->
      <div class="overthrow-form-container" *ngIf="overthrowFormsState[prediction.prediction_id]?.isExpanded">
        <div class="overthrow-header">
          <i class="fa-solid fa-crown"></i> Destrona al Rey
        </div>

        <div class="overthrow-body">
          <div class="input-row">
            <div class="user-avatar-small">
              <img src="https://api.dicebear.com/9.x/fun-emoji/svg?seed=you" alt="You">
            </div>
            <div class="input-area">
              <textarea placeholder="Escribe tu mensaje para ser el nuevo Rey..."
                [(ngModel)]="overthrowFormsState[prediction.prediction_id].text" rows="2">
              </textarea>

              <!-- GIF Preview -->
              <div class="gif-preview-mini" *ngIf="overthrowFormsState[prediction.prediction_id]?.gifUrl">
                <img [src]="overthrowFormsState[prediction.prediction_id].gifUrl" alt="GIF">
                <button class="remove-btn" (click)="overthrowFormsState[prediction.prediction_id].gifUrl = ''">
                  <i class="fa-solid fa-circle-xmark"></i>
                </button>
              </div>

              <!-- GIF Input -->
              <div class="gif-url-input-mini" *ngIf="overthrowFormsState[prediction.prediction_id].showGifInput">
                <input type="text" [(ngModel)]="overthrowFormsState[prediction.prediction_id].gifUrl"
                  placeholder="GIF URL...">
              </div>
            </div>
          </div>

          <div class="overthrow-actions">
            <div class="left-tools">
              <button class="tool-btn" (click)="toggleOverthrowGifInput(i)"
                [class.active]="overthrowFormsState[prediction.prediction_id].showGifInput">
                <i class="fa-solid fa-photo-film"></i>
              </button>
            </div>
            <div class="right-actions">
              <div class="cost-info">
                🔥 Burns <span>{{ (prediction.featuredComment?.burnedAmount || 0) + 1 }} F</span>
              </div>
              <button class="overthrow-btn" (click)="submitOverthrow(i)"
                [disabled]="!(overthrowFormsState[prediction.prediction_id]?.text?.trim() || overthrowFormsState[prediction.prediction_id]?.gifUrl?.trim()) || overthrowFormsState[prediction.prediction_id].isSubmitting">
                <span *ngIf="!overthrowFormsState[prediction.prediction_id].isSubmitting">Dethrone</span>
                <span *ngIf="overthrowFormsState[prediction.prediction_id].isSubmitting"><i
                    class="fa-solid fa-circle-notch fa-spin"></i> Processing...</span>
              </button>
              <button class="cancel-link" (click)="cancelOverthrow(i)">Cancel</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Action Buttons (Tabs) -->
    <div class="env-card-footer" *ngIf="prediction.actions">
      <button class="env-tab" (click)="navigateToPostDetail(prediction.prediction_id)" title="Comentarios">
        <i class="fa-regular fa-comment"></i>
        <span>{{ prediction.actions.comments || '0' }}</span>
      </button>
      <div class="env-tab-divider"></div>
      <button class="env-tab" (click)="toggleBetPopover(i)" [class.active]="activeBetPopover === i"
        title="Pool de apuestas">
        <i class="fa-regular fa-clock"></i>
        <div class="env-tab-content">
          <span>Apuestas</span>
          <small class="vol-label" *ngIf="prediction.betVolume">Vol. {{ prediction.betVolume | number }} Fierce</small>
        </div>
      </button>
      <div class="env-tab-divider"></div>
      <button class="env-tab" (click)="toggleMarketPopover(i)" [class.active]="activeMarketPopover === i"
        title="Mercado Trading">
        <i class="fa-solid fa-chart-line"></i>
        <div class="env-tab-content">
          <span>Mercado</span>
          <small class="vol-label" *ngIf="prediction.marketVolume">Vol.{{ prediction.marketVolume | number }}
            Fierce</small>
        </div>
      </button>
    </div>

    <!-- Expanded Panels -->
    <app-trading-market *ngIf="activeMarketPopover === i" [prediction]="prediction"
      (trade)="navigateToTrade(prediction)" (close)="closePopover()">
    </app-trading-market>

    <app-bet-pool *ngIf="activeBetPopover === i" [prediction]="prediction" (vote)="onPlaceMutualBet(i, $event)"
      (close)="closePopover()">
    </app-bet-pool>
  </div>

  <!-- Loading more indicator -->
  <div class="loading-more" *ngIf="isLoading && predictions.length > 0">
    Loading more predictions...
  </div>

  <!-- No more data indicator -->
  <div class="no-more-data" *ngIf="!hasMoreData && predictions.length > 0">
    No more predictions to load
  </div>
</div>
