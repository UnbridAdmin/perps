<div class="env-vote-section" *ngIf="prediction?.options && prediction.options.length > 0">
  <div class="env-vote-header">
    <div class="env-fierce-label">
      <span class="dot"></span> Intuición Fierce
      <span class="env-how" (click)="onShowHowItWorks()">¿cómo funciona?</span>
    </div>
    <span class="env-vote-count">{{ prediction.sentimentVotes?.total || 0 | number:'1.0-0' }} votos</span>
  </div>

  <div class="env-options">
    <div class="env-option" 
         *ngFor="let option of visibleOptions" 
         [class.selected]="hasVoted && votedOptionId === option.id"
         (click)="!hasVoted ? onVote(option.id) : null">
      <div class="env-option-bar" [class.green]="option.percentage > 50" [style.width.%]="option.percentage"></div>
      <span class="env-option-label">{{ option.title }}</span>
      <span class="env-option-pct" [style.color]="(hasVoted && votedOptionId === option.id) ? 'var(--env-purple)' : ''">{{ option.percentage }}%</span>
    </div>
  </div>

  <!-- View More Button via Model or just expand inline -->
  <button class="env-show-more" *ngIf="remainingOptionsCount > 0" (click)="showAllOptions = !showAllOptions">
    <span>{{ showAllOptions ? 'ocultar opciones' : 'ver ' + remainingOptionsCount + ' opciones más' }}</span>
    <svg width="12" height="12" viewBox="0 0 12 12" fill="none" [style.transform]="showAllOptions ? 'rotate(180deg)' : 'none'"><path d="M2 4l4 4 4-4" stroke="#9b5cff" stroke-width="1.5" stroke-linecap="round"/></svg>
  </button>
</div>
