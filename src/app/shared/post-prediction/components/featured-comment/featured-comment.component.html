<div class="featured-comment-container" [class.is-king]="!!comment">
    <div class="burn-banner">
        <span class="burn-icon">👑</span>
        <span class="burn-text">Rey de la Colina</span>
        <div class="info-tooltip">
            <span class="info-icon"><i class="fa-solid fa-info"></i></span>
            <div class="tooltip-text">Quema Fierce para fijar tu comentario aquí y ganar visibilidad. El comentario con más
                tokens quemados será el único que se mantenga en la cima.</div>
        </div>
    </div>

    <div class="comment-content" *ngIf="comment; else beTheFirst" (click)="toggleExpanded()" [class.expanded]="isExpanded">
        <div class="comment-grid" [class.has-gif]="!!comment.gifUrl">
            <!-- Columna 1: Datos del Usuario -->
            <div class="user-column">
                <div class="user-info">
                    <div class="avatar"
                        [routerLink]="['/', comment.user]"
                        (click)="$event.stopPropagation()"
                        [style.backgroundImage]="'url(' + (comment.avatar || 'https://api.dicebear.com/9.x/fun-emoji/svg') + ')'">
                    </div>
                    <div class="user-details">
                        <span class="username" 
                            [routerLink]="['/', comment.user]"
                            (click)="$event.stopPropagation()">@{{ comment.user }}</span>
                        <span class="burned-amount">
                            <i class="fa-solid fa-fire-flame-curved"></i> {{ comment.burnedAmount | number }} F
                        </span>
                    </div>
                </div>
            </div>

            <!-- Columna 2: Mensaje -->
            <div class="message-column">
                <p class="comment-text" [class.truncated]="!isExpanded">"{{ comment.text }}"</p>
            </div>

            <!-- Columna 3: GIF (si existe) -->
            <div class="gif-column" *ngIf="comment.gifUrl">
                <div class="featured-gif">
                    <img [src]="comment.gifUrl" alt="Featured GIF">
                </div>
            </div>
        </div>

        <!-- Acciones (mostradas al expandir) -->
        <div class="comment-actions" *ngIf="isExpanded">
            <button class="overthrow-btn" (click)="onOverthrow($event)">
                <i class="fa-solid fa-chess-king"></i> Destronar al Rey
            </button>
        </div>
    </div>

    <ng-template #beTheFirst>
        <div class="be-first-content">
            <p class="empty-text">Nadie ha reclamado el trono aún.</p>
            <button class="overthrow-btn first-btn" (click)="onOverthrow()">
                <i class="fa-solid fa-fire"></i> Quemar Fierce para reinar
            </button>
        </div>
    </ng-template>
</div>
