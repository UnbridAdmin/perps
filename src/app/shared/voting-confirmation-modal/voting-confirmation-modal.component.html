<div class="modal-body">
  <div class="modal-container">
    <button class="close-btn" aria-label="Cerrar" (click)="closeModal()">
      <span>&times;</span>
    </button>

    <!-- Creating user account loading state -->
    <ng-container *ngIf="isCreatingUser; else confirmationTemplate">
      <h2 class="modal-title gradient-text-expandital">Creando Cuenta</h2>
      <p class="modal-subtitle">
        Estamos creando tu cuenta de usuario...
      </p>
      <div class="loading-section">
        <div class="spinner"></div>
      </div>
    </ng-container>

    <ng-template #confirmationTemplate>
      <!-- Vote Confirmation Modal -->
      <h2 class="modal-title gradient-text-expandital">Confirmar Voto</h2>

      <p class="modal-subtitle">
        Estás a punto de votar en la predicción comunitaria
      </p>

      <div class="content-wrapper">
        <div class="steps-section">
          <div class="step-item">
            <div class="step-number">📊</div>
            <div class="step-text">
              <h3>Predicción</h3>
              <p>{{ predictionTitle }}</p>
            </div>
          </div>

          <div class="step-item">
            <div class="step-number">🎯</div>
            <div class="step-text">
              <h3>Tu Voto</h3>
              <p>{{ optionTitle }}</p>
            </div>
          </div>

          <div class="step-item">
            <div class="step-number">⚠️</div>
            <div class="step-text">
              <h3>Importante</h3>
              <p>Solo puedes votar una vez por predicción. Esta acción no se puede deshacer.</p>
            </div>
          </div>
        </div>

        <!-- <div class="image-section">
          <img src="https://ipfs.unbrid.com/landings/fierce/fierce-daapp.webp" alt="Confirmación de voto"
            class="preview-image">
        </div> -->
      </div>

      <div class="modal-actions">
        <button class="btn btn-cancel" (click)="cancelVote()">Cancelar</button>
        <button class="btn btn-success" (click)="confirmVote()">Confirmar Voto</button>
      </div>
    </ng-template>
  </div>
</div>
