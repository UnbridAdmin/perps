<div class="modal-overlay" (click)="closeModal()">
  <div class="modal-content" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <button type="button" class="close-btn" (click)="closeModal()" *ngIf="!disableClose">
        <span>&times;</span>
      </button>
    </div>

    <div class="modal-body">
      <div class="icon-section" *ngIf="image_icon">
        <img [src]="image_icon" [alt]="title" class="modal-icon">
      </div>

      <div class="title-section" *ngIf="title">
        <h3 class="modal-title">{{title}}</h3>
      </div>

      <div class="message-section">
        <p class="modal-message" *ngIf="message1">{{message1}}</p>
        <p class="modal-message" *ngIf="message2">{{message2}}</p>
        <p class="modal-message" *ngIf="message3">{{message3}}</p>
      </div>

      <div class="buttons-section" *ngIf="leftButtonActive || rightButtonActive">
        <div class="button-row">
          <button class="btn btn-cancel" (click)="cancel()" *ngIf="leftButtonActive">
            {{leftButton}}
          </button>
          <button class="btn btn-primary" (click)="accept()" *ngIf="rightButtonActive">
            {{rightButton}}
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
