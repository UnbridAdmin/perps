<div class="modal-header">
  <button type="button" class="close-btn" (click)="closeDialog()">
    <span>&times;</span>
  </button>
</div>

<div class="modal-body">
  <!-- Character info -->
  <div class="character-info" *ngIf="character">
    <div class="text-center mb-4">
      <div class="flex items-center justify-center space-x-2 mb-2">
        <h3 class="character-name">{{ character.name }}</h3>
        <div class="crown-icon" *ngIf="character.id === 'legend'">
          <span class="crown">👑</span>
        </div>
      </div>
    </div>

    <!-- Animated GIF -->
    <div class="gif-container mb-6">
      <img
        [src]="character.gifImage"
        [alt]="character.name + ' animation'"
        class="character-gif"
      />
    </div>

    <!-- Character stats -->
    <div class="stats-container">
      <div class="stat-card daily-base" *ngIf="character.dailyBase">
        <div class="text-center">
          <div class="stat-value">
            💰 {{ formatNumber(character.dailyBase) }}
          </div>
          <div class="stat-label">
            Base Fierce Tokens per day
          </div>
        </div>
      </div>

      <div class="stat-card tap-power">
        <div class="flex justify-between items-center">
          <span class="stat-label">Tap Power</span>
          <span class="stat-value">x{{ character.multiplier }}</span>
        </div>
      </div>
    </div>
  </div>
</div>
