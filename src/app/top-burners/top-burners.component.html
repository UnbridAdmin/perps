<div class="top-burners-container">
  <div class="header">
    <div class="header-left">
      <span class="label">LEADERBOARD</span>
      <h2 class="title">Top Burners</h2>
    </div>
    <div class="header-info" title="Los guardianes que han quemado más Fierce para forjar el futuro.">
      <i class="bi bi-info-circle"></i>
    </div>
  </div>

  <div class="burners-list" infiniteScroll [infiniteScrollDistance]="2" [infiniteScrollThrottle]="50"
    (scrolled)="onScroll()" [scrollWindow]="false">

    <div *ngFor="let burner of burners; let i = index" class="burner-row" [ngClass]="{'top-row': i < 3}">
      <div class="user-cell">
        <div class="avatar-box">
          <img [src]="burner.url_avatar || 'https://api.dicebear.com/9.x/fun-emoji/svg?seed=' + burner.user_username"
            alt="Avatar">
          <span class="rank-badge" *ngIf="i < 3">{{ i + 1 }}</span>
        </div>
        <div class="user-meta">
          <span class="username" (click)="navigateToProfile(burner.user_username, $event)" style="cursor: pointer;">
            {{ burner.user_username }}
            <svg *ngIf="burner.is_verified === 'YES'" viewBox="0 0 22 22" aria-hidden="true" class="verified-check">
              <g>
                <path
                  d="M20.396 11c-.018-.646-.215-1.275-.57-1.816-.354-.54-.852-.972-1.438-1.246.223-.607.27-1.264.14-1.897-.131-.634-.437-1.218-.882-1.687-.47-.445-1.053-.75-1.687-.882-.633-.13-1.29-.083-1.897.14-.273-.587-.704-1.086-1.245-1.44S11.647 1.62 11 1.604c-.646.017-1.273.213-1.813.568s-.969.854-1.24 1.44c-.608-.223-1.267-.272-1.902-.14-.635.13-1.22.436-1.69.882-.445.47-.749 1.055-.878 1.688-.13.633-.08 1.29.144 1.896-.587.274-1.087.705-1.443 1.245-.356.54-.555 1.17-.574 1.817.02.647.218 1.276.574 1.817.356.54.856.972 1.443 1.245-.224.606-.274 1.263-.144 1.896.13.634.433 1.218.877 1.688.47.443 1.054.747 1.687.878.633.132 1.29.084 1.897-.136.274.586.705 1.084 1.246 1.439.54.354 1.17.551 1.816.569.647-.016 1.276-.213 1.817-.567s.972-.854 1.245-1.44c.604.239 1.266.296 1.903.164.636-.132 1.22-.447 1.68-.907.46-.46.776-1.044.908-1.681s.075-1.299-.165-1.903c.586-.274 1.084-.705 1.439-1.246.354-.54.551-1.17.569-1.816zM9.662 14.85l-3.429-3.428 1.293-1.302 2.072 2.072 4.4-4.794 1.347 1.246z">
                </path>
              </g>
            </svg>
          </span>
        </div>
      </div>

      <div class="value-cell">
        <span class="amount"
          [ngClass]="{'highlight-gold': i === 0, 'highlight-silver': i === 1, 'highlight-bronze': i === 2}">
          {{ burner.total_burned_fierce | number:'1.0-1' }}
        </span>
        <span class="unit">FIERCE</span>
      </div>
    </div>

    <!-- Loading State -->
    <div *ngIf="isLoading" class="loading-state">
      <div class="spinner"></div>
      <span>Cargando guardianes...</span>
    </div>

    <!-- Empty State -->
    <div *ngIf="!isLoading && burners.length === 0" class="empty-state">
      <i class="bi bi-fire icon"></i>
      <p>Aún no hay guardianes. ¡Sé el primero en quemar!</p>
    </div>

    <!-- End Message -->
    <div *ngIf="!hasMoreData && burners.length > 0" class="end-message">
      Has llegado al final de la élite.
    </div>
  </div>
</div>
