<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Profile</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap"
    rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --surface2: #18181f;
      --border: rgba(255, 255, 255, 0.08);
      --border-focus: rgba(120, 100, 255, 0.6);
      --accent: #7c5cfc;
      --accent2: #c084fc;
      --text: #f0eeff;
      --text-muted: #8b8a9b;
      --success: #34d399;
      --error: #f87171;
      --radius: 16px;
    }

    body {
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      padding: 20px;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 60% 40% at 20% 0%, rgba(124, 92, 252, 0.12) 0%, transparent 60%),
        radial-gradient(ellipse 40% 30% at 80% 100%, rgba(192, 132, 252, 0.08) 0%, transparent 60%);
      pointer-events: none;
    }

    .modal {
      width: 100%;
      max-width: 520px;
      background: var(--surface);
      border-radius: 24px;
      border: 1px solid var(--border);
      overflow: hidden;
      box-shadow: 0 32px 80px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 255, 255, 0.04);
      animation: modalIn 0.35s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes modalIn {
      from {
        opacity: 0;
        transform: translateY(24px) scale(0.97);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    /* ── Header ── */
    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
    }

    .modal-header h2 {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 1.1rem;
      letter-spacing: -0.02em;
    }

    .btn-close {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text-muted);
      cursor: pointer;
      display: grid;
      place-items: center;
      transition: all 0.2s;
    }

    .btn-close:hover {
      background: rgba(255, 255, 255, 0.08);
      color: var(--text);
    }

    .btn-save {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 50px;
      color: #fff;
      font-family: 'Syne', sans-serif;
      font-weight: 600;
      font-size: 0.85rem;
      padding: 9px 22px;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.01em;
    }

    .btn-save:hover {
      opacity: 0.85;
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(124, 92, 252, 0.35);
    }

    .btn-save:active {
      transform: translateY(0);
    }

    /* ── Body ── */
    .modal-body {
      padding: 0 0 24px;
      overflow-y: auto;
      max-height: calc(100vh - 160px);
    }

    /* ── Banner Zone ── */
    .banner-zone {
      position: relative;
      height: 150px;
      background: var(--surface2);
      overflow: hidden;
      cursor: pointer;
    }

    .banner-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
      transition: opacity 0.3s;
    }

    .banner-img.loaded {
      display: block;
    }

    .banner-placeholder {
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 8px;
    }

    .banner-placeholder svg {
      opacity: 0.3;
    }

    .banner-placeholder span {
      font-size: 0.75rem;
      color: var(--text-muted);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .banner-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .banner-zone:hover .banner-overlay {
      opacity: 1;
    }

    .overlay-btn {
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 50px;
      color: #fff;
      font-family: 'Syne', sans-serif;
      font-size: 0.8rem;
      font-weight: 600;
      padding: 8px 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 7px;
      transition: background 0.2s;
    }

    .overlay-btn:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    /* ── Avatar Zone ── */
    .avatar-zone {
      position: relative;
      margin: -38px 0 0 24px;
      width: 80px;
      height: 80px;
      z-index: 2;
    }

    .avatar-ring {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: 3px solid var(--surface);
      background: var(--surface2);
      overflow: hidden;
      cursor: pointer;
      position: relative;
      transition: transform 0.2s;
    }

    .avatar-ring:hover {
      transform: scale(1.04);
    }

    .avatar-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
    }

    .avatar-img.loaded {
      display: block;
    }

    .avatar-fallback {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Syne', sans-serif;
      font-size: 1.6rem;
      font-weight: 800;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
    }

    .avatar-fallback.hidden {
      display: none;
    }

    .avatar-overlay {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .avatar-ring:hover .avatar-overlay {
      opacity: 1;
    }

    /* ── URL Input Panel ── */
    .url-panel {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 0;
      overflow: hidden;
      max-height: 0;
      transition: max-height 0.35s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.25s;
      opacity: 0;
    }

    .url-panel.open {
      max-height: 120px;
      opacity: 1;
    }

    .url-panel-inner {
      padding: 16px;
    }

    .url-panel label {
      display: block;
      font-size: 0.72rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
      font-family: 'Syne', sans-serif;
    }

    .url-input-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .url-input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      padding: 10px 14px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .url-input::placeholder {
      color: var(--text-muted);
    }

    .url-input:focus {
      border-color: var(--border-focus);
      box-shadow: 0 0 0 3px rgba(124, 92, 252, 0.12);
    }

    .url-input.error {
      border-color: var(--error);
    }

    .url-input.success {
      border-color: var(--success);
    }

    .btn-apply {
      background: var(--accent);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-family: 'Syne', sans-serif;
      font-size: 0.8rem;
      font-weight: 600;
      padding: 10px 16px;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s;
    }

    .btn-apply:hover {
      background: #6a4edc;
    }

    .url-status {
      margin-top: 6px;
      font-size: 0.75rem;
      min-height: 16px;
      transition: all 0.2s;
    }

    .url-status.ok {
      color: var(--success);
    }

    .url-status.err {
      color: var(--error);
    }

    .url-status.loading {
      color: var(--text-muted);
    }

    /* ── Form Fields ── */
    .form-section {
      padding: 20px 24px 0;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .field-group {
      position: relative;
    }

    .field-group label {
      position: absolute;
      top: 12px;
      left: 14px;
      font-size: 0.72rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      font-family: 'Syne', sans-serif;
      pointer-events: none;
      transition: all 0.2s;
    }

    .field-input,
    .field-textarea {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      padding: 28px 14px 10px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      resize: none;
    }

    .field-input:focus,
    .field-textarea:focus {
      border-color: var(--border-focus);
      box-shadow: 0 0 0 3px rgba(124, 92, 252, 0.1);
    }

    .field-textarea {
      min-height: 90px;
    }

    .char-count {
      position: absolute;
      bottom: 10px;
      right: 14px;
      font-size: 0.7rem;
      color: var(--text-muted);
    }

    .char-count.warn {
      color: #fbbf24;
    }

    .char-count.over {
      color: var(--error);
    }

    /* ── URL panels inside form ── */
    .image-url-section {
      padding: 0 24px;
      margin-top: 4px;
    }

    /* ── Divider ── */
    .divider {
      height: 1px;
      background: var(--border);
      margin: 4px 24px;
    }

    /* ── Tooltips ── */
    .tip-tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: rgba(124, 92, 252, 0.12);
      border: 1px solid rgba(124, 92, 252, 0.2);
      border-radius: 50px;
      padding: 3px 10px;
      font-size: 0.7rem;
      color: var(--accent2);
      margin-top: 4px;
    }

    .section-label {
      padding: 0 24px;
      margin-top: 20px;
      font-size: 0.72rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      font-family: 'Syne', sans-serif;
    }

    .image-config-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      background: none;
      border: 1px dashed var(--border);
      border-radius: 10px;
      color: var(--text-muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      padding: 10px 14px;
      cursor: pointer;
      width: 100%;
      transition: all 0.2s;
      margin-top: 6px;
    }

    .image-config-btn:hover {
      border-color: var(--accent);
      color: var(--accent2);
      background: rgba(124, 92, 252, 0.06);
    }

    .image-config-btn svg {
      flex-shrink: 0;
    }

    .chevron {
      transition: transform 0.3s;
    }

    .open .chevron {
      transform: rotate(180deg);
    }

    /* ── Preview chip ── */
    .preview-chip {
      display: none;
      align-items: center;
      gap: 6px;
      background: rgba(52, 211, 153, 0.1);
      border: 1px solid rgba(52, 211, 153, 0.25);
      border-radius: 50px;
      padding: 3px 10px 3px 6px;
      font-size: 0.72rem;
      color: var(--success);
      margin-top: 6px;
    }

    .preview-chip.visible {
      display: inline-flex;
    }

    .preview-chip img {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      object-fit: cover;
    }
  </style>
</head>

<body>

  <div class="modal">
    <!-- Header -->
    <div class="modal-header">
      <button class="btn-close" onclick="closeModal()">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M1 1l12 12M13 1L1 13" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
        </svg>
      </button>
      <h2>Editar perfil</h2>
      <button class="btn-save" onclick="saveProfile()">Guardar</button>
    </div>

    <!-- Body -->
    <div class="modal-body">

      <!-- Banner -->
      <div class="banner-zone" id="bannerZone" onclick="togglePanel('bannerPanel', 'bannerBtn')">
        <div class="banner-placeholder" id="bannerPlaceholder">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
            <rect x="3" y="3" width="18" height="18" rx="3" />
            <circle cx="8.5" cy="8.5" r="1.5" />
            <path d="M21 15l-5-5L5 21" />
          </svg>
          <span>Portada</span>
        </div>
        <img class="banner-img" id="bannerImg" alt="Banner" onerror="onImgError('banner')" onload="onImgLoad('banner')">
        <div class="banner-overlay">
          <button class="overlay-btn" onclick="event.stopPropagation(); togglePanel('bannerPanel', 'bannerBtn')">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71" />
              <path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71" />
            </svg>
            Configurar URL
          </button>
        </div>
      </div>

      <!-- Banner URL Panel -->
      <div class="image-url-section" style="margin-top: 10px;">
        <button class="image-config-btn" id="bannerBtn" onclick="togglePanel('bannerPanel', 'bannerBtn')">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71" />
            <path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71" />
          </svg>
          URL de imagen de portada
          <svg class="chevron" style="margin-left:auto" width="14" height="14" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2">
            <path d="M6 9l6 6 6-6" />
          </svg>
        </button>
        <div class="preview-chip" id="bannerChip">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M20 6L9 17l-5-5" />
          </svg>
          Vista previa activa
        </div>

        <div class="url-panel" id="bannerPanel">
          <div class="url-panel-inner">
            <label>URL de imagen de portada</label>
            <div class="url-input-row">
              <input type="url" class="url-input" id="bannerUrlInput" placeholder="https://imagen.com/banner.jpg"
                oninput="onUrlInput('banner')" onkeydown="onUrlKeydown(event,'banner')">
              <button class="btn-apply" onclick="applyUrl('banner')">Aplicar</button>
            </div>
            <div class="url-status" id="bannerStatus"></div>
          </div>
        </div>
      </div>

      <!-- Avatar -->
      <div style="display:flex; align-items:flex-end; gap:12px; padding: 0 24px; margin-top:8px;">
        <div class="avatar-zone">
          <div class="avatar-ring" id="avatarRing" onclick="togglePanel('avatarPanel', 'avatarBtn')">
            <div class="avatar-fallback" id="avatarFallback">LC</div>
            <img class="avatar-img" id="avatarImg" alt="Avatar" onerror="onImgError('avatar')"
              onload="onImgLoad('avatar')">
            <div class="avatar-overlay">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                <path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71" />
                <path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71" />
              </svg>
            </div>
          </div>
        </div>
        <div>
          <div style="font-family:'Syne',sans-serif; font-weight:700; font-size:1rem;">Leonardo Cruz</div>
          <div class="tip-tag">
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10" />
              <path d="M12 16v-4M12 8h.01" />
            </svg>
            Usa URL para tu avatar
          </div>
        </div>
      </div>

      <!-- Avatar URL Panel -->
      <div class="image-url-section" style="margin-top: 10px;">
        <button class="image-config-btn" id="avatarBtn" onclick="togglePanel('avatarPanel', 'avatarBtn')">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <circle cx="12" cy="8" r="4" />
            <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" />
          </svg>
          URL de foto de perfil
          <svg class="chevron" style="margin-left:auto" width="14" height="14" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2">
            <path d="M6 9l6 6 6-6" />
          </svg>
        </button>
        <div class="preview-chip" id="avatarChip">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M20 6L9 17l-5-5" />
          </svg>
          Vista previa activa
        </div>

        <div class="url-panel" id="avatarPanel">
          <div class="url-panel-inner">
            <label>URL de foto de perfil</label>
            <div class="url-input-row">
              <input type="url" class="url-input" id="avatarUrlInput" placeholder="https://imagen.com/avatar.jpg"
                oninput="onUrlInput('avatar')" onkeydown="onUrlKeydown(event,'avatar')">
              <button class="btn-apply" onclick="applyUrl('avatar')">Aplicar</button>
            </div>
            <div class="url-status" id="avatarStatus"></div>
          </div>
        </div>
      </div>

      <div class="divider" style="margin-top:20px;"></div>

      <!-- Form fields -->
      <div class="form-section">
        <div class="field-group">
          <label>Nombre</label>
          <input type="text" class="field-input" id="nameInput" value="Leonardo Cruz" maxlength="50"
            oninput="updateCharCount('name', 50)">
          <span class="char-count" id="nameCount">13/50</span>
        </div>

        <div class="field-group">
          <label>Bio</label>
          <textarea class="field-textarea" id="bioInput" maxlength="160" placeholder="Cuéntanos sobre ti..."
            oninput="updateCharCount('bio', 160)"></textarea>
          <span class="char-count" id="bioCount">0/160</span>
        </div>
      </div>

    </div><!-- /modal-body -->
  </div>

  <script>
    // ── State ──
    const state = {
      bannerUrl: '',
      avatarUrl: '',
      openPanel: null
    };

    // ── Panel toggle ──
    function togglePanel(panelId, btnId) {
      const panel = document.getElementById(panelId);
      const btn = document.getElementById(btnId);
      const isOpen = panel.classList.contains('open');

      // close all
      document.querySelectorAll('.url-panel').forEach(p => p.classList.remove('open'));
      document.querySelectorAll('.image-config-btn').forEach(b => b.classList.remove('open'));

      if (!isOpen) {
        panel.classList.add('open');
        btn.classList.add('open');
        // focus input
        setTimeout(() => {
          const input = panel.querySelector('.url-input');
          if (input) input.focus();
        }, 200);
      }
    }

    // ── URL apply logic ──
    let debounceTimers = {};

    function onUrlInput(type) {
      clearTimeout(debounceTimers[type]);
      debounceTimers[type] = setTimeout(() => {
        const val = document.getElementById(type + 'UrlInput').value.trim();
        if (val && isValidUrl(val)) {
          setStatus(type, 'loading', '⏳ Cargando vista previa...');
          tryLoadImage(type, val);
        } else {
          setStatus(type, '', '');
        }
      }, 600);
    }

    function onUrlKeydown(event, type) {
      if (event.key === 'Enter') applyUrl(type);
    }

    function applyUrl(type) {
      const val = document.getElementById(type + 'UrlInput').value.trim();
      if (!val) {
        setStatus(type, 'err', '⚠ Por favor ingresa una URL');
        return;
      }
      if (!isValidUrl(val)) {
        setStatus(type, 'err', '⚠ URL no válida. Debe comenzar con https://');
        document.getElementById(type + 'UrlInput').classList.add('error');
        return;
      }
      setStatus(type, 'loading', '⏳ Cargando imagen...');
      tryLoadImage(type, val);
    }

    function tryLoadImage(type, url) {
      const testImg = new Image();
      testImg.crossOrigin = 'anonymous';
      testImg.onload = () => {
        state[type + 'Url'] = url;
        const img = document.getElementById(type + 'Img');
        img.src = url;
      };
      testImg.onerror = () => {
        onImgError(type);
        setStatus(type, 'err', '⚠ No se pudo cargar. Verifica la URL o permisos CORS');
        const input = document.getElementById(type + 'UrlInput');
        input.classList.remove('success'); input.classList.add('error');
      };
      testImg.src = url;
    }

    function onImgLoad(type) {
      const input = document.getElementById(type + 'UrlInput');
      input.classList.remove('error'); input.classList.add('success');
      setStatus(type, 'ok', '✓ Imagen cargada correctamente');
      document.getElementById(type + 'Chip').classList.add('visible');

      if (type === 'avatar') {
        document.getElementById('avatarImg').classList.add('loaded');
        document.getElementById('avatarFallback').classList.add('hidden');
      } else {
        document.getElementById('bannerImg').classList.add('loaded');
        document.getElementById('bannerPlaceholder').style.display = 'none';
      }
    }

    function onImgError(type) {
      if (type === 'avatar') {
        document.getElementById('avatarImg').classList.remove('loaded');
        document.getElementById('avatarFallback').classList.remove('hidden');
      } else {
        document.getElementById('bannerImg').classList.remove('loaded');
        document.getElementById('bannerPlaceholder').style.display = '';
      }
      document.getElementById(type + 'Chip').classList.remove('visible');
    }

    function setStatus(type, cls, msg) {
      const el = document.getElementById(type + 'Status');
      el.className = 'url-status ' + cls;
      el.textContent = msg;
    }

    function isValidUrl(str) {
      try {
        const u = new URL(str);
        return u.protocol === 'https:' || u.protocol === 'http:';
      } catch { return false; }
    }

    // ── Char count ──
    function updateCharCount(field, max) {
      const el = document.getElementById(field + 'Input');
      const counter = document.getElementById(field + 'Count');
      const len = el.value.length;
      counter.textContent = len + '/' + max;
      counter.className = 'char-count' + (len > max * 0.9 ? (len >= max ? ' over' : ' warn') : '');
    }

    // ── Save ──
    function saveProfile() {
      const btn = document.querySelector('.btn-save');
      btn.textContent = '✓ Guardado';
      btn.style.background = 'linear-gradient(135deg, #059669, #34d399)';
      setTimeout(() => {
        btn.textContent = 'Guardar';
        btn.style.background = '';
      }, 2000);
    }

    function closeModal() {
      document.querySelector('.modal').style.animation = 'none';
      document.querySelector('.modal').style.transition = 'opacity 0.2s, transform 0.2s';
      document.querySelector('.modal').style.opacity = '0';
      document.querySelector('.modal').style.transform = 'scale(0.96)';
    }

    // Init char count
    updateCharCount('name', 50);
  </script>
</body>

</html>
